<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gametrim — Torneios</title>
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/pages/torneios.css" />
</head>

<body>
  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">
      <img src="../assets/icons/GametrimLogo.svg" alt="Gametrim" />
    </a>
    <ul class="navbar-links">
      <li><a href="#jogos">Jogos</a></li>
      <li><a href="#mercado">Mercado</a></li>
      <li><a href="#jogadores">Jogadores</a></li>
    </ul>
    <div class="navbar-buttons">
      <button class="btn-login">Fazer Login</button>
      <button class="btn-cadastrar">Cadastrar-se</button>
    </div>
    <button class="hamburger" aria-label="Abrir menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="drawer">
    <a href="#jogos" class="drawer-link">Jogos</a>
    <a href="#mercado" class="drawer-link">Mercado</a>
    <a href="#jogadores" class="drawer-link">Jogadores</a>
    <div class="drawer-buttons">
      <button class="btn-login">Fazer Login</button>
      <button class="btn-cadastrar">Cadastrar-se</button>
    </div>
  </div>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <img src="../assets/images/torneios/torneios-hero.webp" alt="Valorant" class="page-hero-bg" />
    <div class="page-hero-overlay"></div>
    <div class="page-hero-content">
      <p class="page-hero-tag">Todos os torneios — Jogo selecionado</p>
      <img src="../assets/images/torneios/valorant.svg" alt="Valorant" class="subtitle-valorant" />
      <h1 class="page-hero-title">Valorant<br>Tornaments</h1>
      <p class="page-hero-text">
        Comece sua equipe ou entre em uma para participar e apareça para o mundo ver seu potencial.
      </p>
      <a href="#" class="page-hero-btn">Criar Torneio</a>
    </div>
  </section>


  <script src="../js/navbar.js"></script>
  <script>
    document.querySelectorAll('.game-tab').forEach(tab => {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
